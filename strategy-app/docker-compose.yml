services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/strategy
      - FRONTEND_ORIGIN=http://localhost:3000
      - JWT_SECRET=super-secret-change-me
      - ACCESS_TOKEN_TTL=15m
      - REFRESH_TOKEN_DAYS=7
      - COOKIE_SECURE=false
      - ANALYTICS_URL=http://analytics:5001
      - START_ANALYTICS=false
    depends_on:
      - mongodb

  analytics:
    build: ./python-analytics
    ports:
      - "5001:5001"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://localhost:5000
      - VITE_ANALYTICS_URL=http://localhost:5001
    depends_on:
      - backend
      - analytics

volumes:
  mongo_data:
