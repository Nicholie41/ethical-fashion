<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <link href="styles/tailwind.min.css" rel="stylesheet">
</head>
<body>
  <nav class="bg-green-700 text-white p-4 flex justify-between">
    <span class="font-bold">Ethical Fashion</span>
    <div>
      <a href="index.html" class="mr-4">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>
  <main class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Products</h1>
    <div class="mb-4 flex gap-2">
      <input id="search" type="text" placeholder="Search..." class="border p-2 rounded">
      <input id="minScore" type="number" placeholder="Min Score" class="border p-2 rounded">
      <input id="material" type="text" placeholder="Material" class="border p-2 rounded">
      <button onclick="loadProducts()" class="bg-green-700 text-white px-4 rounded">Filter</button>
    </div>
    <div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
  </main>
  <script src="js/products.js"></script>
</body>
</html>
