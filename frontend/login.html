<!DOCTYPE html>
<html lang="en">
<head>

  <title>Login</title>
  <link href="styles/tailwind.min.css" rel="stylesheet">
</head>
<body>
  <nav class="bg-green-700 text-white p-4 flex justify-between">
    <span class="font-bold">Ethical Fashion</span>
    <div>
      <a href="index.html" class="mr-4">Home</a>
      <a href="products.html">Products</a>
    </div>

  <main class="max-w-md mx-auto mt-8 bg-white shadow-md rounded p-6">

      <div id="error" class="text-red-600 mb-2"></div>

      <button class="bg-green-700 text-white py-2 px-4 rounded w-full">Login</button>
    </form>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
